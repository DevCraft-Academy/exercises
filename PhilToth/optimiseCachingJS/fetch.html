<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>JavaScript In-Memory Caching</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
    }

    button {
      padding: 0.6rem 1rem;
      font-size: 1rem;
      cursor: pointer;
    }

    #result {
      margin-top: 1.5rem;

      transition: background-color 0.3s;

    .from-cache {
      background-color: #e0ffe0;
    }

    .from-network {

    }

    img {
      max-width: 300px;
      display: block;
      margin-top: 1rem;
      border-radius: 8px;
    }

    .error {
      color: red;
      font-weight: bold;
    }
  </style>
  <script src="server.js"></script>
