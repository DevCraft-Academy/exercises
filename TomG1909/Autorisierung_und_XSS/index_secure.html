<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>XSS Demo – Escape + Validierung</title>
</head>
<body>
  <h1>XSS Demo (mit Escape + Validierung)</h1>
  <form id="userForm">
    <input type="text" id="userInput" placeholder="Gib etwas ein">
    <button type="submit">Absenden</button>
  </form>
  <div id="output"></div>
  <div id="error" style="color:red;"></div>

  <script>
    const form = document.getElementById('userForm');
    const output = document.getElementById('output');
    const error = document.getElementById('error');

    function escapeHTML(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function containsDangerousChars(str) {
      return /[<>]/.test(str);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const value = document.getElementById('userInput').value;

      if (containsDangerousChars(value)) {
        error.textContent = "⚠️ Ungültige Eingabe: < und > sind nicht erlaubt!";
        output.textContent = "";
        return;
      }

      error.textContent = "";
      output.innerHTML = "Eingabe: " + escapeHTML(value);
    });
  </script>
</body>
</html>
