<!-- Anders als Clemens habe ich die built-in Validierung von JS benutzt. Beim submit kann ebenfalls durch eine built-in Funktion geprüft werden ob die Form valide ist-->

<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <h1>Test Form1</h1>
        <form id="myForm">
            <label for="name" name="name">Name</label>
            <br>
            <input
                type="text"
                id="name"
                placeholder="Bitte Namen eingeben"
                required
            >
            <p id="name-error"></p>
            <br>
            <label for="email"> E-mail</label>
            <br>
            <input type="email" id="email" placeholder="Bitte Email eingeben" required>
            <p id="email-error"></p>
            <br>
            <label for="password1" name="password1">Passwort</label>
            <br>
            <input
                type="password"
                id="password1"
                placeholder="Bitte Passwort eingeben"
                minlength="8"
                required
            >
            <p id="password1-error"></p>
            <br>
            <label for="password2">Passwort wiederholen</label>
            <br>
            <input
                type="password"
                id="password2"
                placeholder="Bitte Passwort nochmal eingeben"
                required
            >
            <p id="password2-error"></p>
            <br>
            <button type="submit">submit</button>
        </form>
        <script defer src="form.js"></script>
    </body>
</html>
