<!-- Chrome hat mittlerweile XSS-Auditing und Script-Blocking. Man kann das umgehen indem man z.B. folgendes einfügt: <img src="x" onerror="alert('XSS')"> -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>XSS Demo - Geschützt + Validierung</title>
  <style>
    body { font-family: sans-serif; }
    #error { color: red; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>XSS Demo (geschützt + validiert)</h1>
  
  <form id="demoForm">
    <label>
      Nachricht:
      <input type="text" id="message" name="message">
    </label>
    <button type="submit">Senden</button>
  </form>

  <div id="error"></div>
  <div id="output"></div>

  <script>
    // Entschärfen für den Fall, dass doch etwas durchgeht
    function escapeHTML(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // Validieren: keine gefährlichen Zeichen zulassen
    function isValidInput(str) {
      const forbidden = /[<>"'&]/; // enthält eines der Zeichen?
      return !forbidden.test(str);
    }

    const form = document.getElementById('demoForm');
    const output = document.getElementById('output');
    const error = document.getElementById('error');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const msg = document.getElementById('message').value;

      if (!isValidInput(msg)) {
        error.textContent = "❌ Ungültige Eingabe: Bitte keine Sonderzeichen wie <, >, \", ', &.";
        output.innerHTML = "";
        return;
      }

      error.textContent = "";
      const safe = escapeHTML(msg);
      output.innerHTML = `<p>Du hast geschrieben: ${safe}</p>`;
    });
  </script>
</body>
</html>
